version: 1.0

representation:
  side_panel:
    label: ECS Blue/Green Service (Internet-Facing)
  node:
    label:
      static: ECS Blue/Green Service
      template: ${name}
    display_type: default

variables:
  launch_type:
    description: ECS launch type
    type: string
    options:
      - FARGATE
      - EC2
    ui_control: select
  cpu_architecture:
    description: CPU architecture for the Fargate runtime platform
    type: string
    options:
      - X86_64
      - ARM64
    ui_control: select
  operating_system_family:
    description: Operating system family
    type: string
    options:
      - LINUX
      - WINDOWS_SERVER_2019_FULL
      - WINDOWS_SERVER_2019_CORE
      - WINDOWS_SERVER_2022_FULL
      - WINDOWS_SERVER_2022_CORE
    ui_control: select
  ssl_policy:
    description: SSL/TLS security policy for HTTPS listeners
    type: string
    options:
      - ELBSecurityPolicy-TLS13-1-2-2021-06
      - ELBSecurityPolicy-TLS13-1-2-Res-2021-06
      - ELBSecurityPolicy-TLS13-1-3-2021-06
      - ELBSecurityPolicy-2016-08
      - ELBSecurityPolicy-FS-1-2-Res-2020-10
    ui_control: select
  container_definitions:
    description: JSON-encoded container definitions for the ECS task
    type: string
    ui_control: json

discovery:
  type: aws_ecs_blue_green_service
  dnd_supported: false
  references:
    vpc_id:
      from: aws_vpc
      output: id
    public_subnet_ids:
      from: aws_subnet
      output: id
    private_subnet_ids:
      from: aws_subnet
      output: id
    cluster_arn:
      from: aws_ecs_cluster
      output: arn
    certificate_arn:
      from: aws_acm_certificate
      output: arn
    execution_role_arn:
      from: aws_iam_role
      output: arn
    task_role_arn:
      from: aws_iam_role
      output: arn
