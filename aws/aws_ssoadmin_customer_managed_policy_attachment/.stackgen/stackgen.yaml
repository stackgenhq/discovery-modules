version: "1.0"
representation:
  side_panel:
    label: "AWS SSO Customer Managed Policy Attachment"
    icon: "aws-ssoadmin-customer-managed-policy-attachment"
  node:
    label:
      static: "SSO Customer Managed Policy Attachment"
      template: "SSO CM Policy - ${permission_set_arn}"
variables:
  customer_managed_policy_reference:
    label: "Customer Managed Policy Reference"
    description: "Reference to the ARN of the customer-managed IAM policy to be attached to the specified permission set."
    type: "list(object)"
    ui_control: "object_list"
    attributes:
      name:
        label: "Policy Name"
        type: "string"
        ui_control: "text"
      path:
        label: "Policy Path"
        type: "string"
        ui_control: "text"
    validation:
      required: false
  instance_arn:
    label: "Instance ARN"
    description: "ARN of the AWS SSO instance to which the customer-managed policy will be attached."
    type: "string"
    ui_control: "text"
    validation:
      required: false
  permission_set_arn:
    label: "Permission Set ARN"
    description: "ARN of the permission set to attach the customer-managed policy to. Must be a valid and existing permission set ARN."
    type: "string"
    ui_control: "text"
    validation:
      required: false
  timeouts:
    label: "Timeouts"
    description: "Defines the duration for operations to complete, such as attaching or detaching customer-managed policies, with specified timeout constraints."
    type: "object"
    ui_control: "object"
    attributes:
      create:
        label: "Create"
        type: "string"
        ui_control: "text"
        validation:
          required: false
      delete:
        label: "Delete"
        type: "string"
        ui_control: "text"
        validation:
          required: false
    validation:
      required: false
variable_groups:
  - label: "Attachment Target"
    description: "SSO instance and permission set"
    variables: ["instance_arn", "permission_set_arn"]
  - label: "Policy Reference"
    description: "Customer managed IAM policies to attach"
    variables: ["customer_managed_policy_reference"]
  - label: "Timeouts"
    description: "Optional create and delete timeouts"
    variables: ["timeouts"]

discovery:
  type: aws_ssoadmin_customer_managed_policy_attachment
  dnd_supported: false
